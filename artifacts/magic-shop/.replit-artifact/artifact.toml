kind = "web"
previewPath = "/"
title = "Magic Shop CRM"
version = "1.0.0"
id = "artifacts/magic-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23545

[services.development]
run = "pnpm --filter @workspace/magic-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magic-shop", "run", "build" ]
publicDir = "artifacts/magic-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23545"
BASE_PATH = "/"
